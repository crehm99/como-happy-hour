<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoMo Happy Hour Finder</title>
    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="favicon.png">

    <meta property="og:title" content="CoMo Happy Hour" />
<meta property="og:description" content="Find the best drink and food specials in Columbia, MO." />
<meta property="og:image" content="favicon.png" />

</head>
<body>

    <header>
        <h1>CoMo Happy Hour</h1>
        <p id="current-time">Detecting time...</p>
    </header>

    <main>
        <section id="active-section">
            <h2 class="section-title">Happening Now</h2>
            <div id="happy-hour-list">
                </div>
        </section>

        <section id="upcoming-section">
            <div id="upcoming-list">
                </div>
        </section>

        <div class="filter-container">
    <button class="filter-btn active" data-tag="all">All</button>
    <button class="filter-btn" data-tag="beer">Beer</button>
    <button class="filter-btn" data-tag="wine">Wine</button>
    <button class="filter-btn" data-tag="cocktails">Cocktails</button>
    <button class="filter-btn" data-tag="food">Food</button>
    <button class="filter-btn" data-tag="patio">Patio</button>
</div>

        <section id="directory-section">
            <h2 class="section-title">Weekly Directory</h2>
            
            <div class="search-container">
                <input type="text" id="directory-search" placeholder="Search by establishment name (e.g. Irene's)...">
            </div>

            <div class="directory-controls">
                <button id="view-by-day" class="toggle-btn active">By Day</button>
                <button id="view-by-bar" class="toggle-btn">By Establishment (A-Z)</button>
            </div>

            <div id="day-nav-container" class="filter-container" style="display: none;">
    <button class="day-nav-btn" onclick="scrollToDay('Monday')">Mon</button>
    <button class="day-nav-btn" onclick="scrollToDay('Tuesday')">Tue</button>
    <button class="day-nav-btn" onclick="scrollToDay('Wednesday')">Wed</button>
    <button class="day-nav-btn" onclick="scrollToDay('Thursday')">Thu</button>
    <button class="day-nav-btn" onclick="scrollToDay('Friday')">Fri</button>
    <button class="day-nav-btn" onclick="scrollToDay('Saturday')">Sat</button>
    <button class="day-nav-btn" onclick="scrollToDay('Sunday')">Sun</button>
</div>

            <div id="full-directory">
                </div>
        </section>

        <section id="submission-section">
            <h2 class="section-title">Found a Deal?</h2>
            <div class="submission-card">
                <p>Help the community! Submit a happy hour we missed.</p>
                <form action="https://formspree.io/f/xgodelkj" method="POST" id="deal-form">
                    <input type="text" name="barName" placeholder="Establishment Name" required>
                    <input type="text" name="dealDetails" placeholder="What is the deal? (e.g. $2 Tacos)" required>
                    <input type="text" name="hours" placeholder="Hours (e.g. 4pm-6pm)" required>
                    <button type="submit">Submit Deal</button>
                </form>
            </div>
        </section>
    </main>

<footer>
    <p id="update-date">Deals last verified: --</p>
    <p class="disclaimer">Note: Deals are subject to change and are not guaranteed. Please verify with the venue upon arrival.</p>
</footer>

    <script src="script.js"></script>
</body>
</html>
